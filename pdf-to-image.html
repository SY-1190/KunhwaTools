<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF → 이미지 | Kunhwa Utility Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Sans:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body data-page="pdf-to-image">
    <header class="site-header">
      <div class="brand-wrap">
        <div class="cat-mascot" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 25 12 11l12 8M47 25l5-14-12 8" fill="#f7b267" />
            <circle cx="32" cy="34" r="20" fill="#ffd18b" stroke="#d88d35" stroke-width="2" />
            <circle cx="24.5" cy="33" r="2.6" fill="#2e2e2e" />
            <circle cx="39.5" cy="33" r="2.6" fill="#2e2e2e" />
            <path d="M32 36.5v5m0 0-4 3m4-3 4 3" stroke="#2e2e2e" stroke-width="2" stroke-linecap="round" fill="none" />
          </svg>
        </div>
        <div>
          <h1>Kunhwa Utility Tools</h1>
          <p class="brand-desc">PDF → 이미지 변환기</p>
        </div>
      </div>
      <button id="themeToggle" class="btn ghost" type="button">☀ 화이트 모드</button>
    </header>
    <main class="page-layout">
      <aside class="tool-nav">
        <p class="tool-nav-title">TOOLS</p>
        <a href="./index.html" data-page="home">🏠 홈</a>
        <a href="./pdf-to-image.html" data-page="pdf-to-image">🗎 PDF → 이미지</a>
        <a href="./image-to-pdf.html" data-page="image-to-pdf">🖼 이미지 → PDF</a>
        <a href="./pdf-arrange.html" data-page="pdf-arrange">↕ PDF 순서변경/나누기</a>
        <a href="./pdf-merge.html" data-page="pdf-merge">⊞ PDF 합치기</a>
        <a href="./image-resize.html" data-page="image-resize">⬚ 이미지 크기조정</a>
        <a href="./image-format.html" data-page="image-format">⇆ 이미지 포맷변환</a>
        <a href="./process-timer.html" data-page="process-timer">⏱ 공정 작업시간 측정기</a>
        <a href="./qr-generator.html" data-page="qr-generator">▦ QR 코드 생성기</a>
      </aside>
      <section class="content-panel">
        <article class="tool-card" id="pdfToImage">
          <h2><span class="icon">🗎</span> 1. PDF → 이미지 변환기</h2>
          <p class="sub">PDF 페이지를 PNG/JPG로 변환하여 ZIP으로 저장</p>
          <div class="form-grid">
            <label>PDF 파일<input type="file" id="pdfToImageFile" accept=".pdf" /></label>
            <label>출력 포맷
              <select id="pdfToImageFormat">
                <option value="png">PNG</option>
                <option value="jpeg">JPG</option>
              </select>
            </label>
            <label>해상도 배율
              <input type="range" id="pdfToImageScale" min="1" max="3" step="0.5" value="1.5" />
            </label>
          </div>
          <div class="btn-row">
            <button class="btn primary" id="runPdfToImage">변환하기</button>
            <button class="btn ghost" id="cancelPdfToImage" disabled>취소</button>
          </div>
          <div class="progress-wrap">
            <progress id="progressPdfToImage" max="100" value="0"></progress>
            <span id="progressPdfToImageLabel">0%</span>
            <span id="etaPdfToImageLabel" class="eta-label">ETA --:--</span>
          </div>
          <p class="status" id="pdfToImageStatus"></p>
        </article>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
