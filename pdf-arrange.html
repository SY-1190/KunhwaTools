<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF 순서변경/나누기 | Kunhwa Utility Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=IBM+Plex+Sans:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body data-page="pdf-arrange">
    <header class="site-header">
      <div class="brand-wrap">
        <div class="cat-mascot" aria-hidden="true">🐱</div>
        <div>
          <h1>Kunhwa Utility Tools</h1>
          <p class="brand-desc">PDF 순서변경/페이지 나누기</p>
        </div>
      </div>
      <button id="themeToggle" class="btn ghost" type="button">☀ 화이트 모드</button>
    </header>
    <main class="page-layout">
      <aside class="tool-nav">
        <p class="tool-nav-title">TOOLS</p>
        <a href="./index.html" data-page="home">🏠 홈</a>
        <a href="./pdf-to-image.html" data-page="pdf-to-image">🗎 PDF → 이미지</a>
        <a href="./image-to-pdf.html" data-page="image-to-pdf">🖼 이미지 → PDF</a>
        <a href="./pdf-arrange.html" data-page="pdf-arrange">↕ PDF 순서변경/나누기</a>
        <a href="./pdf-merge.html" data-page="pdf-merge">⊞ PDF 합치기</a>
        <a href="./image-resize.html" data-page="image-resize">⬚ 이미지 크기조정</a>
        <a href="./image-format.html" data-page="image-format">⇆ 이미지 포맷변환</a>
        <a href="./process-timer.html" data-page="process-timer">⏱ 공정 작업시간 측정기</a>
        <a href="./qr-generator.html" data-page="qr-generator">▦ QR 코드 생성기</a>
      </aside>
      <section class="content-panel">
        <article class="tool-card" id="pdfArrange">
          <h2><span class="icon">↕</span> 3. PDF 순서 변경 / 페이지 나누기</h2>
          <p class="sub">썸네일 드래그 정렬 + 구간 블록 분할</p>
          <div class="form-grid">
            <label>PDF 파일<input type="file" id="arrangePdfFile" accept=".pdf" /></label>
            <label>페이지 나누기 (예: 1-2|3-4|5)<input type="text" id="splitInput" placeholder="1-2|3-5" /></label>
          </div>
          <div class="btn-row">
            <button class="btn ghost" id="loadArrangePdf">썸네일 불러오기</button>
            <button class="btn primary" id="runReorderPdf">정렬 순서로 다운로드</button>
            <button class="btn ghost" id="runSplitPdf">분할 다운로드(ZIP)</button>
            <button class="btn ghost" id="cancelArrange" disabled>취소</button>
          </div>
          <div class="btn-row">
            <button class="btn ghost" id="toggleSplitSelectMode">분할 선택 모드: OFF</button>
            <button class="btn ghost" id="addSplitBlock">선택 구간 블록 추가</button>
            <button class="btn ghost" id="clearSplitBlocks">분할 블록 초기화</button>
          </div>
          <p class="order-line">현재 순서: <strong id="arrangeOrderText">-</strong></p>
          <div id="pdfThumbGrid" class="thumb-grid"></div>
          <div class="split-blocks">
            <p class="order-line">분할 블록:</p>
            <div id="splitBlocksList"></div>
          </div>
          <div class="progress-wrap">
            <progress id="progressArrange" max="100" value="0"></progress>
            <span id="progressArrangeLabel">0%</span>
            <span id="etaArrangeLabel" class="eta-label">ETA --:--</span>
          </div>
          <p class="status" id="arrangePdfStatus"></p>
        </article>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
